name: Team Directory — Single Server Deploy

on:
  push:
    branches: [main]

# ─────────────────────────────────────────────────────────────
# Job 1: Detect Changes
# Checks which folders changed to trigger the right jobs
# ─────────────────────────────────────────────────────────────
jobs:
   detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            frontend:
              - 'app/frontend/**'
            backend:
              - 'app/backend/**'

# ─────────────────────────────────────────────────────────────
# Job 2: Deploy Frontend
# Only runs if detect-changes found changes in app/frontend/
# ─────────────────────────────────────────────────────────────
   deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Sync Frontend Files
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            ./app/frontend/ \
            ubuntu@${{ secrets.SERVER_PUBLIC_IP }}:/var/www/html/app/

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.SERVER_PUBLIC_IP }} \
              "sudo systemctl reload nginx"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa

# ─────────────────────────────────────────────────────────────
# Job 3: Deploy Backend
# Only runs if detect-changes found changes in app/backend/
# ─────────────────────────────────────────────────────────────
   deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Sync Backend Files
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            ./app/backend/ \
            ubuntu@${{ secrets.SERVER_PUBLIC_IP }}:/var/app/backend/

      - name: Install Dependencies & Restart App
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.SERVER_PUBLIC_IP }} \
              "bash -c 'cd /var/app/backend && source ~/.nvm/nvm.sh && nvm use default && npm install && sudo \$(which pm2) restart nt-api'"
      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa